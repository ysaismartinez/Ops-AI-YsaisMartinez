name: Build and Deploy to GKE

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ops-ai-ysais-martinez
  REGION: us-central1
  ZONE: us-central1-a
  CLUSTER_NAME: operationalizing-ai
  REPOSITORY: docker-repo
  IMAGE_NAME: demand-api

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'

    - name: Set up gcloud
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker $REGION-docker.pkg.dev --quiet

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push Docker image
      run: |
        docker buildx build \
          --platform linux/amd64 \
          -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE_NAME:latest \
          -f week2/starter/Dockerfile . \
          --push

    - name: Get GKE credentials
      run: |
        gcloud container clusters get-credentials $CLUSTER_NAME \
          --zone $ZONE \
          --project $PROJECT_ID

    - name: Create GCS service account secret
      run: |
        echo '${{ secrets.GCP_SA_KEY }}' > key.json
        kubectl delete secret gcs-sa-key --ignore-not-found
        kubectl create secret generic gcs-sa-key --from-file=key.json=key.json
        
    - name: Deploy to GKE
      run: |
        kubectl apply -f week2/starter/k8s/configmap.yaml
        kubectl apply -f week2/starter/k8s/service.yaml
        kubectl apply -f week2/starter/k8s/deployment.yaml

    - name: Restart deployment
      run: kubectl rollout restart deployment demand-api

    - name: Check rollout status
      run: kubectl rollout status deployment demand-api --timeout=300s

    - name: Check pods
      run: kubectl get pods
