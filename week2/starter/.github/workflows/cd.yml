# GitHub Actions CD (Continuous Deployment) Pipeline
# Triggered on merge to main: authenticate to GCP, build & push Docker image, deploy to GKE
# Questions:
# - When should CD run? (only on main? on every commit?)
# - How does GitHub authenticate to GCP without storing credentials?
# - What should happen if deployment fails?

name: CD — Deploy to GKE

on:
  push:
    branches:
      - main  # Only deploy on main branch merges

env:
  GCP_PROJECT_ID: ops-ai-ysais-martinez  # Replace [YOUR-NAME] with your project suffix
  GCP_ZONE: us-central1-a
  CLUSTER_NAME: operationalizing-ai
  ARTIFACT_REGISTRY_REGION: us-central1
  ARTIFACT_REGISTRY_REPO: docker-repo
  IMAGE_NAME: demand-api

jobs:
  # Build, push, and deploy the application
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # Required for Workload Identity

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # Authenticate to GCP using service account key (from GitHub Secret)
    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v1
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Install gke-gcloud-auth-plugin
      run: |
        gcloud components install gke-gcloud-auth-plugin

    # Get credentials to connect to GKE cluster
    - name: Get GKE cluster credentials
      run: |
        gcloud container clusters get-credentials ${{ env.CLUSTER_NAME }} \
          --zone ${{ env.GCP_ZONE }} \
          --project ${{ env.GCP_PROJECT_ID }}

    # Configure Docker to push to Artifact Registry
    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev

    # Build and push image with two tags:
    # - latest: for quick reference
    # - git SHA: for traceability and rollback
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push Docker image
      uses: docker/build-push-action@v4
      with:
        context: .
        file: ./week2/starter/Dockerfile
        push: true
        tags: |
          ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:latest
          ${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

    # Update deployment with new image (rolling update - no downtime)
    - name: Update Deployment image
      run: |
        kubectl set image deployment/demand-api \
          demand-api=${{ env.ARTIFACT_REGISTRY_REGION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.ARTIFACT_REGISTRY_REPO }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --record \
          -n default

    # Step 5: Wait for deployment to finish before returning
    # Questions: Why wait? What if rollout fails? Should we alert?
    - name: Wait for rollout
      run: |
        kubectl rollout status deployment/demand-api \
          --timeout=5m \
          -n default

    - name: Verify deployment
      run: |
        kubectl get pods -n default
        kubectl get svc demand-api -n default
